---
- name: Basic System Setup - Ubuntu
  hosts: web
  become: true
  vars:
    user_name: 'ansible'
  tasks:
    - name: Update package cache
      ansible.builtin.apt:
        name: '*'
        update_cache: true
        cache_valid_time: 3600
    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist

    - name: Create a new user
      ansible.builtin.user:
        name: "{{ user_name }}"
        state: present
        create_home: true